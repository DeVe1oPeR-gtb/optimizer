# =============================================================================
# para.cfg — 最適化まわりの共通パラメータ・モード（トレース・最適化器・反復数・各最適化器の重み等）
# =============================================================================
#
# 【試行用】1行で複数指定: key=val を ; でつなげると1行で反映されます。
# 値のうしろに # でメモを書けます（例: pso_w=0.7  # 慣性）。
# 下のいずれかをコピーして、先頭の # を外して貼り付けると即反映（同じキーは後勝ち）。
#
# pso_w=0.8;pso_c1=2;pso_c2=0.8;pso_n_particle=30
# pso_w=0.7;pso_n_particle=50;n_iter_pso=200
# lm_max_try=3;lm_lambda_down=0.3;n_iter_lm=50
# de_f=0.6;de_cr=0.85;de_n_pop=30;n_iter_de=150
#
# =============================================================================

# 実行する最適化器（必須）。PSO, DE, LM のいずれかまたはカンマ区切り。INIT=設定初期値で計算のみ、DB=DB値で計算のみ
optimizer=PSO,DE,LM

# 実績・予測の種類ごとの最適化使用（製品ごとに複数種類ある場合）。カンマ区切りで使用する data_type_id を指定。空または未指定なら全種類を使用
# optimization_data_types=thickness,profile

# position の有効範囲（0~1）。オンサイトで position は 0~1 で入れる。範囲外の点は最適化対象から外す。例: 0.05, 0.95
# optimization_position_min=0.05
# optimization_position_max=0.95

# LM: パラメータ上下限を適用するか（on/off）
lm_apply_bounds=on

# 最適化器の反復数（省略時は 120, 120, 80）
n_iter_pso=120
n_iter_de=120
n_iter_lm=80

# -----------------------------------------------------------------------------
# PSO（粒子群最適化）
# -----------------------------------------------------------------------------
pso_w=0.7          # 慣性重み
pso_c1=1.8         # パーソナルベスト重み
pso_c2=1.8         # グローバルベスト重み
pso_n_particle=20  # 粒子数
pso_init_radius=0.5  # 初期範囲の半径（z0±）

# -----------------------------------------------------------------------------
# DE（差分進化）
# -----------------------------------------------------------------------------
de_f=0.5    # 変異係数
de_cr=0.9   # 交叉率
de_n_pop=20 # 個体数
de_init_radius=0.5  # 初期範囲の半径

# -----------------------------------------------------------------------------
# LM（Levenberg-Marquardt）
# -----------------------------------------------------------------------------
lm_lambda_init=10.0   # 初期ダンピング λ
lm_r_perturb=0.005    # 摂動量
lm_lambda_min=1e-10   # λ 下限
lm_lambda_max=1e12    # λ 上限
lm_lambda_down=0.5    # ステップ採用時の λ 縮小率
lm_lambda_up=10.0     # ステップ却下時の λ 拡大率
lm_max_try=8          # 1反復あたりの最大試行回数

# -----------------------------------------------------------------------------
# 結果出力（PLOG / LLOG / DLOG・最終パラメータ）
# -----------------------------------------------------------------------------
# PLOG: 1 製品 1 行・列を横に追加。終了時 1 回 flush。{timestamp}, {product_id} 利用可
# plog_filename=result/summary_{timestamp}.csv
# 汎用 CSV 最適化後用（2 タイミング書き出し時）
# csv_filename_after=result/after_{timestamp}.csv
# LLOG/DLOG: 有効(1/on/true), 開始インデックス, 最大点数, LLOG を 1 ファイルにまとめるか
# detail_enabled=0
# detail_start_index=0
# detail_max_points=0
# llog_one_file=1
# LLOG: 全製品 1 ファイル
# llog_filename=result/llog_{timestamp}.csv
# DLOG: 1 製品 1 ファイル（{product_id} 利用可）
# dlog_filename=result/dlog_{product_id}_{timestamp}.csv
# 1ファイル最大バイト・合計最大バイト（0=制限なし）。超えたら警告して書き出しスキップ
# result_file_max_bytes=0
# result_total_max_bytes=0
# 最適化終了パラメータを書き出すテキストファイル（空なら無効）。ターミナルにも同じ形式で出力（設定へコピペ用）
# result_final_params_filename=result/final_params.txt

# -----------------------------------------------------------------------------
# コイルデータ用（必要に応じてコメント解除）
# -----------------------------------------------------------------------------
# xcoil_file=
# data_path=
# binary_struct=

# =============================================================================
# Danger Zone — 開発者用（トレース・デバッグ・ログ容量・デモモード）
# =============================================================================
# 本番では trace=off, debug=off を推奨。ログは容量チェックでローテートされます。
#
# トレース: on=ログ出力有効 / off=無効
trace=on
# デバッグ: on=入力チェック・デバッグ情報をログ出力 / off=無効（trace とは別）
debug=off
# トレースログ最大バイト数（超過で .bak に退避して新規作成）。省略時 10MiB
# trace_log_max_bytes=10485760
# デバッグログ最大バイト数。省略時 1MiB
# debug_log_max_bytes=1048576
# PSO DEMO: reference=参照実装互換（再現性あり） / default=通常 PSO
# pso_demo_mode=reference
# 隠し: optimizer=ALL_OPT_EXEC で PSO,DE,LM をすべて実行
