# trace=on|off でトレース出力を制御
trace=on
# optimizer=PSO,DE,LM で実行する最適化器を指定（省略時は3つとも実行）
# optimizer=PSO
# optimizer=DE
# optimizer=LM
optimizer=PSO,DE,LM
# LM 用: パラメータの上下限を適用するか（on/off）。off のときは LM で bounds をクリップしない
lm_apply_bounds=on
# コイルデータ: 年月日・コイルNO リストファイル（例: xcoil.txt）
# xcoil_file=
# コイルデータ: バイナリファイルのベースディレクトリ
# data_path=
# コイルデータ: 読み込むバイナリの構造体名。ファイル名規則: コイルNO(6桁)_年月日(yyyymmdd).binary_struct
# binary_struct=
